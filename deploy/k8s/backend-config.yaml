apiVersion: v1
kind: ConfigMap
metadata:
  name: bmi-backend-config
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  CORS_ALLOW_ORIGINS: "https://bookmyinterview.example.com"
  REDIS_URL: "redis://bmi-redis:6379/0"
  CELERY_BROKER_URL: "redis://bmi-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://bmi-redis:6379/0"
  METRICS_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  DEFAULT_REGION: "us-east-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: bmi-backend-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://user:password@bmi-postgres:5432/bookmyinterview"
  JWT_SECRET_KEY: "replace-with-strong-secret"
  ENCRYPTION_KEY: "replace-with-32-byte-key"
