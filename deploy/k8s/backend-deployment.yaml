apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmi-backend
  labels:
    app: bmi-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bmi-backend
  template:
    metadata:
      labels:
        app: bmi-backend
    spec:
      containers:
        - name: backend
          image: bookmyinterview/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: bmi-backend-config
            - secretRef:
                name: bmi-backend-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bmi-backend
spec:
  selector:
    app: bmi-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bmi-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bmi-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
