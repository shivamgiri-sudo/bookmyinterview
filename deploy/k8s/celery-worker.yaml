apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmi-celery-worker
  labels:
    app: bmi-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bmi-celery-worker
  template:
    metadata:
      labels:
        app: bmi-celery-worker
    spec:
      containers:
        - name: worker
          image: bookmyinterview/backend:latest
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info", "-c", "4"]
          envFrom:
            - configMapRef:
                name: bmi-backend-config
            - secretRef:
                name: bmi-backend-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bmi-celery-beat
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: beat
              image: bookmyinterview/backend:latest
              command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]
              envFrom:
                - configMapRef:
                    name: bmi-backend-config
                - secretRef:
                    name: bmi-backend-secrets
          restartPolicy: OnFailure
